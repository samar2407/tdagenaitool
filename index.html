<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Tool</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 60px auto; padding: 0 20px; }
    h1 { font-size: 24px; margin-bottom: 24px; }
    select, textarea, button { width: 100%; padding: 10px; margin-top: 12px; font-size: 15px; box-sizing: border-box; }
    textarea { height: 120px; resize: vertical; }
    button { background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 16px; }
    button:hover { background: #1d4ed8; }
    #output { margin-top: 24px; background: #f3f4f6; padding: 16px; border-radius: 8px; white-space: pre-wrap; min-height: 60px; }
    #loading { display: none; color: #6b7280; margin-top: 12px; }
    body.dark {
  background: #0f172a;
  color: #e2e8f0;
}
body.dark select,
body.dark textarea {
  background: #1e293b;
  color: #e2e8f0;
  border: 1px solid #334155;
}
body.dark #output {
  background: #1e293b;
  color: #e2e8f0;
}
body.dark #history-list > div {
  background: #1e293b !important;
  border-color: #334155 !important;
  color: #e2e8f0 !important;
}
  </style>
</head>
<body>
  <h1>AI Tool</h1>
  <button onclick="toggleTheme()" id="themeBtn" style="margin-bottom: 16px; background: #374151; color: white; border: none; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 13px;">🌙 Dark Mode</button>


  <select id="feature">
    <option value="1">Explain a Concept</option>
    <option value="2">Summarize Text</option>
    <option value="3">Generate Quiz Questions</option>
  </select>

  <textarea id="userInput" placeholder="Enter your text here..."></textarea>

  <button onclick="generate()">Generate</button>
  <button onclick="clearHistory()" style="background: #6b7280; margin-top: 8px;">Clear History</button>

  <p id="loading">Thinking...</p>

  <div id="output"></div>
  <hr style="margin-top: 32px; border-color: #e5e7eb;">
  <h2 style="font-size: 16px; margin-top: 16px; margin-bottom: 8px;">Chat History</h2>
  <div id="history-list" style="display: flex; flex-direction: column; gap: 12px;"></div>

  <script>


  let history = JSON.parse(localStorage.getItem("chatHistory") || "[]");

  
  window.onload = function () {
    const historyList = document.getElementById("history-list");
    history.forEach(function (item, i) {
      if (item.role === "user") {
        const reply = history[i + 1]?.content || "";
        const entry = document.createElement("div");
        entry.style = "background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; font-size: 14px;";
        entry.innerHTML = `
          <p><strong>You:</strong> ${item.content}</p>
          <p style="margin-top: 6px; color: #374151;"><strong>AI:</strong> ${reply}</p>
        `;
        historyList.appendChild(entry);
      }
    });
  };

  async function generate() {
    const choice = document.getElementById("feature").value;
    const userInput = document.getElementById("userInput").value;
    const output = document.getElementById("output");
    const loading = document.getElementById("loading");

    if (!userInput.trim()) {
      output.textContent = "Please enter some text.";
      return;
    }

    loading.style.display = "block";
    output.textContent = "";

    const res = await fetch("/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ choice, user_input: userInput, history })
    });

    const data = await res.json();
    loading.style.display = "none";

    const reply = data.response || data.error;
    output.textContent = reply;

    
    history.push({ role: "user", content: userInput });
    history.push({ role: "assistant", content: reply });
    localStorage.setItem("chatHistory", JSON.stringify(history));

    
    const historyList = document.getElementById("history-list");
    const entry = document.createElement("div");
    entry.style = "background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; font-size: 14px;";
    entry.innerHTML = `
      <p><strong>You:</strong> ${userInput}</p>
      <p style="margin-top: 6px; color: #374151;"><strong>AI:</strong> ${reply}</p>
    `;
    historyList.appendChild(entry);
  }

  function clearHistory() {
    history = [];
    localStorage.removeItem("chatHistory");
    document.getElementById("history-list").innerHTML = "";
    document.getElementById("output").textContent = "";
  }
  
if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
  document.getElementById("themeBtn").textContent = "☀️ Light Mode";
}

function toggleTheme() {
  const isDark = document.body.classList.toggle("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  document.getElementById("themeBtn").textContent = isDark ? "☀️ Light Mode" : "🌙 Dark Mode";
}  
  </script>
</body>
</html>
